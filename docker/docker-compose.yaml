name: ouster_dome

services:
  ouster_dome:
    environment:
      - ouster_dome
      - DISPLAY
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '0.001'
    #      memory: 500M
    #    reservations:
    #      cpus: '0.0001'
    #      memory: 100M
    # privileged: true
    network_mode: host
    ipc: host
    volumes:
      - /dev:/dev
      - $XAUTHORITY:/root/.Xauthority
      - ../src:/ros2_ws/src
      - ../data:/data
    tty: true
    device_cgroup_rules:
      - 'c 81:* rmw'
      - 'c 189:* rmw'
    # Sensor mode
    command: ros2 launch ouster_ros sensor.launch.xml sensor_hostname:=${SENSOR_HOST_NAME}
    # Recording mode
    # command: ros2 launch ouster_ros record.launch.xml sensor_hostname:=${SENSOR_HOST_NAME} bag_file:=${BAG_FILE_PATH}/${BAG_FILE_NAME} metadata:=${BAG_FILE_PATH}/${BAG_FILE_NAME}/${BAG_FILE_NAME}_metadata.json
    # Replay mode
    # command: ros2 launch ouster_ros replay.launch.xml bag_file:=${BAG_FILE_PATH}/${BAG_FILE_NAME}/${BAG_FILE_NAME}_0.db3 metadata:=${BAG_FILE_PATH}/${BAG_FILE_NAME}/${BAG_FILE_NAME}_metadata.json
    #command: sleep infinity
    #restart: unless-stopped